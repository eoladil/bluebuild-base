---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: base-images/fedora-silverblue-nvidia
description: A Fedora Silverblue based image featuring proprietary NVIDIA drivers.
base-image: quay.io/fedora-ostree-desktops/silverblue
image-version: 44
platforms:
  - linux/amd64
modules:
  - from-file: base/common.yml
  - from-file: base/silverblue.yml
  - from-file: base/nvidia.yml
  - type: os-release
    properties:
      PRETTY_NAME: BlueBuild OS
  - from-file: base/post-build.yml